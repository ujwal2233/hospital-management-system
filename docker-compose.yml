services:
  mongo:
    image: mongo:7
    container_name: hms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hms-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: hms-backend
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: "3000"
      MONGODB_URI: mongodb://mongo:27017/hms
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: hms-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
