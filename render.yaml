services:
  # ---------------------------------------------------------
  # 1. NestJS Backend API (Native Node.js — no Docker)
  # ---------------------------------------------------------
  - type: web
    name: hms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: node dist/main.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://hms-frontend.onrender.com
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_HOST
        fromService:
          type: redis
          name: hms-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: hms-redis
          property: port
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard using your MongoDB Atlas URI

  # ---------------------------------------------------------
  # 2. React + Vite Frontend (Static Site — no Docker/nginx)
  # ---------------------------------------------------------
  - type: web
    name: hms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --no-audit --no-fund && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_BASE
        value: https://hms-backend.onrender.com/api/v1

  # ---------------------------------------------------------
  # 3. Managed Redis
  # ---------------------------------------------------------
  - type: redis
    name: hms-redis
    plan: free
    ipAllowList: []
